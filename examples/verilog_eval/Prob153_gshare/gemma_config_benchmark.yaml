checkpoint_interval: 10
database:
  archive_size: 5
  elite_selection_ratio: 0.2
  embedding_model: embedding_models/Nomic-Embed-Code/nomic-embed-code-q5_k_m.gguf
  exploitation_ratio: 0.7
  num_islands: 4
  population_size: 40
  programs_per_island: 10
  similarity_threshold: 0.95
diff_based_evolution: false
early_stopping_patience: 99999
evaluator:
  parallel_evaluations: 2
  timeout: 30
file_suffix: .v
language: verilog
llm:
  evaluator_models:
  - max_tokens: 4096
    model_path: /home/jonathan13/GemmaEvolve/gemma-3-12b-it-Q8_0.gguf
    n_ctx: 8192
    n_gpu_layers: -1
    name: gemma-local
    temperature: 0.7
    top_p: 0.95
  models:
  - max_tokens: 4096
    model_path: /home/jonathan13/GemmaEvolve/gemma-3-12b-it-Q8_0.gguf
    n_ctx: 8192
    n_gpu_layers: -1
    name: gemma-local
    temperature: 0.7
    top_p: 0.95
log_level: INFO
max_code_length: 5000
max_iterations: 50
prompt:
  include_artifacts: false
  num_diverse_programs: 0
  num_top_programs: 0
  system_message: "You are an expert Hardware Design Engineer. Your task is to implement\
    \ a Verilog module.\n\nDescription:\nThe problem is to design a gshare branch\
    \ predictor. It uses a 7-bit PC and a 7-bit global history register, XORed to\
    \ form a 7-bit index into a 128-entry table of 2-bit saturating counters (the\
    \ PHT). The predictor makes predictions based on the PHT and global history, and\
    \ it is trained with the actual branch outcomes. Training updates the PHT and,\
    \ in the case of mispredictions, recovers the branch history register to its state\
    \ after the mispredicted branch. Training takes precedence over prediction if\
    \ both occur simultaneously.\n\nInterface:\nmodule TopModule (\n  input clk,\n\
    \  input areset,\n\n  input predict_valid,\n  input [6:0] predict_pc,\n  output\
    \ predict_taken,\n  output [6:0] predict_history,\n\n  input train_valid,\n  input\
    \ train_taken,\n  input train_mispredicted,\n  input [6:0] train_history,\n  input\
    \ [6:0] train_pc\n);\n\nRequirements:\n- Implement the module logic using `assign`\
    \ statements where possible.\n- Follow Verilog-2001 standards.\n- Output ONLY\
    \ the Verilog module code.\n"
target_score: 1.0
