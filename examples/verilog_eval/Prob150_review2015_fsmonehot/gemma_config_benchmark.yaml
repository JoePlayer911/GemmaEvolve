prompt:
  include_artifacts: false
  num_diverse_programs: 0
  num_top_programs: 0
  system_message: "You are an expert Hardware Design Engineer. Your task is to implement\
    \ a Verilog module.\n\nDescription:\nThe problem describes a Moore state machine\
    \ with three inputs (d, done_counting, ack) and three outputs (shift_ena, counting,\
    \ done). The state machine begins in state 'S' and transitions based on the input\
    \ 'd'. It includes states 'S', 'S1', 'S11', 'S110', 'B0', 'B1', 'B2', 'B3', 'Count',\
    \ and 'Wait'. The 'shift_ena' output is asserted in states 'B0', 'B1', 'B2', and\
    \ 'B3'. The 'counting' output is asserted in the 'Count' state. The 'done' output\
    \ is asserted in the 'Wait' state. The state transitions and output logic must\
    \ be derived from the state diagram provided. The task is to implement the combinational\
    \ logic for the next-state and output signals given a 10-bit one-hot encoded state\
    \ input.\n\nInterface:\nmodule TopModule (\n  input d,\n  input done_counting,\n\
    \  input ack,\n  input [9:0] state, // 10-bit one-hot current state\n  output\
    \ B3_next,\n  output S_next,\n  output S1_next,\n  output Count_next,\n  output\
    \ Wait_next,\n  output done,\n  output counting,\n  output shift_ena\n);\n\nRequirements:\n\
    - Implement the module logic using `assign` statements where possible.\n- Follow\
    \ Verilog-2001 standards.\n- Output ONLY the Verilog module code.\n"
target_score: 1.0
