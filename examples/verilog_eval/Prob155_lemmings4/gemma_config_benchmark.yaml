log_level: INFO
max_code_length: 5000
max_iterations: 50
prompt:
  include_artifacts: false
  num_diverse_programs: 0
  num_top_programs: 0
  system_message: "You are an expert Hardware Design Engineer. Your task is to implement\
    \ a Verilog module.\n\nDescription:\nThe Lemming circuit models a Lemming's behavior\
    \ in a 2D world. It can walk left or right, switching directions upon bumping\
    \ into an obstacle on either side. When the ground disappears, the Lemming falls\
    \ (\"aaah!\"). Once the ground reappears, it resumes walking in its previous direction.\
    \ The Lemming can also dig if it's walking on the ground; it digs until it falls,\
    \ then resumes walking. Finally, if a Lemming falls for more than 20 clock cycles\
    \ and then hits the ground, it splatters and stops all actions.\n\nInterface:\n\
    module TopModule (\n  input clk,\n  input areset,\n  input bump_left,\n  input\
    \ bump_right,\n  input ground,\n  input dig,\n  output walk_left,\n  output walk_right,\n\
    \  output aaah,\n  output digging\n);\n\nRequirements:\n- Implement the module\
    \ logic using `assign` statements where possible.\n- Follow Verilog-2001 standards.\n\
    - Output ONLY the Verilog module code.\n"
target_score: 1.0
